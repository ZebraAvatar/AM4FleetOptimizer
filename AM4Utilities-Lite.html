<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM4 Calculator</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}
  input{font:inherit}
  h1,h2,h3,p{margin:0}

  .page{min-height:100vh;background:#1c1917;padding:1rem .75rem}
  .wrap{max-width:56rem}

  /* header */
  .hdr{display:flex;gap:.75rem;margin-bottom:1.5rem}
  .logo{width:3.5rem;height:3.5rem;color:#10b981;transform:rotate(45deg)}
  .hdr h1{font-size:1.875rem;line-height:2.25rem;font-weight:700;color:#10b981}
  .sub{font-size:.875rem;color:#9ca3af}

  .tools{display:flex;flex-direction:column;gap:.75rem}

  /* card */
  .card{background:#292524;border-radius:.75rem;box-shadow:0 4px 6px -1px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.1);overflow:hidden}
  .cardHead{display:flex;justify-content:space-between;align-items:center;padding:.75rem;cursor:pointer;transition:background-color .15s}
  .cardHead h2{font-size:1.25rem;line-height:1.75rem;font-weight:700;color:#10b981}
  .headRight{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
  .clearBtn{display:none;width:1.75rem;height:1.75rem;align-items:center;justify-content:center;background:#f43f5e;color:#fff;border-radius:9999px;font-size:1.125rem;font-weight:700;transition:background-color .15s}
  .card.open.hasResults .clearBtn{display:flex}
  .chev{width:1.25rem;height:1.25rem;color:#10b981;transition:transform .2s}
  .card.open .chev{transform:rotate(180deg)}

  /* collapsible body */
  .body{max-height:0;opacity:0;overflow:hidden;transition:max-height .2s ease,opacity .2s ease}
  .card.open .body{max-height:1000px;opacity:1}
  .inner{padding:0 .75rem .75rem;display:flex;flex-direction:column;gap:.75rem}

  /* fields */
  .field label{display:block;padding-bottom:.25rem;font-size:.875rem;font-weight:500;color:#10b981}
  .field input{width:100%;padding:.25rem .75rem;border:1px solid #6ee7b7;border-radius:.375rem;background:transparent;color:#d4d4d4;outline:none}
  .field input:focus{border-color:#10b981;box-shadow:0 0 0 2px #10b981}
  .field input::placeholder{color:#9ca3af}

  /* results */
  .results{display:none;padding:0 .75rem .75rem}
  .card.hasResults .results{display:block}
  .resBox{padding:0 .5rem;background:#404040;border-radius:.375rem}
  .resGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:.5rem 0}
  .resCell{text-align:center}
  .resLabel{font-size:.75rem;color:#9ca3af;padding-bottom:.25rem}
  .resVal{width:6rem;margin:0 auto;font-size:1.125rem;font-weight:600;color:#10b981;background:#525252;border-radius:.375rem}

  /* aircraft search */
  .acBox{display:flex;flex-direction:column;gap:.375rem;background:#404040;padding:.5rem .5rem .25rem;border-radius:.5rem}
  .acBox h3{font-size:.875rem;font-weight:600;color:#34d399}
  .combo{position:relative}
  .comboInner{position:relative}
  .acSearch{width:100%;padding:.375rem 5rem .375rem .75rem;border:1px solid #6ee7b7;border-radius:.375rem;background:#292524;color:#d4d4d4;font-size:.875rem;outline:none}
  .acSearch:focus{box-shadow:0 0 0 2px #10b981}
  .badge{display:none;position:absolute;right:.5rem;top:50%;transform:translateY(-50%);align-items:center;gap:.25rem}
  .count{font-size:.75rem;background:#059669;color:#fff;padding:.125rem .5rem;border-radius:9999px}
  .acClear{color:#9ca3af}
  .acToggle{display:flex;color:#34d399}
  .acToggle svg{width:1rem;height:1rem;transition:transform .2s}
  .badge.dropOpen .acToggle svg{transform:rotate(180deg)}

  .dropdown{display:none;position:absolute;z-index:10;width:100%;margin-top:.25rem;background:#292524;border:1px solid rgba(16,185,129,.3);border-radius:.375rem;box-shadow:0 10px 15px -3px rgb(0 0 0/.1),0 4px 6px -4px rgb(0 0 0/.1);max-height:15rem;overflow:auto}
  .opt{display:flex;justify-content:space-between;align-items:center;padding:.5rem .75rem;cursor:pointer;font-size:.875rem;color:#d4d4d4;transition:background-color .15s}
  .opt.sel{background:rgba(16,185,129,.2)}
  .opt.hi{background:#059669;color:#fff}
  .optModel{font-weight:500}
  .optSeats{font-size:.75rem;opacity:.75}

  .noRes{display:none;position:absolute;z-index:10;width:100%;margin-top:.25rem;background:#292524;border:1px solid rgba(244,63,94,.3);border-radius:.375rem;padding:.75rem}
  .noRes p{font-size:.875rem;color:#fb7185}

  .acInfo{display:none;background:#292524;padding:.5rem;border-radius:.375rem;border:1px solid rgba(16,185,129,.3)}
  .acInfoRow{display:flex;flex-wrap:wrap;justify-content:center;gap:.25rem 2rem;font-size:.75rem}
  .acItem{display:flex;align-items:center;gap:.375rem}
  .acItem svg{flex-shrink:0;color:#34d399}
  .acItem .i24{width:1rem;height:1rem}
  .acItem .i20{width:.875rem;height:.875rem}
  .acItem span{color:#d4d4d4}
  .acGroup{display:flex;align-items:center;gap:2rem;flex-shrink:0}
  .acModel{min-width:0;max-width:100%}
  .acModel span{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .hints{display:none;font-size:.75rem;color:#6b7280;margin-top:.25rem}
  .hints kbd{padding:0 .25rem;background:#57534e;border-radius:.25rem}
  @media(min-width:1024px){.hints{display:block}.acModel{max-width:50%}}

  /* footer */
  .foot{margin-top:1.5rem;font-size:.875rem;text-align:center}
  .foot a{color:#fb7185;text-decoration:underline}

  /* hover styles apply only on pointer devices (no sticky hover on touch) */
  @media(hover:hover){
    .cardHead:hover{background:#44403c}
    .clearBtn:hover{background:#e11d48}
    .acClear:hover{color:#fff}
    .acToggle:hover{color:#6ee7b7}
    .opt:hover{background:#44403c}
  }
</style>
</head>
<body>
<!-- icon sprite: each shape defined once, referenced via <use href="#..."> -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-plane" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></symbol>
  <symbol id="i-chev" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-seat" viewBox="0 0 24 24"><path d="M4 18v3h3v-3h10v3h3v-6H4zm15-8h3v3h-3zM2 10h3v3H2zm15 3H7V5c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2v8z"/></symbol>
  <symbol id="i-tag" viewBox="0 0 20 20"><path fill-rule="evenodd" clip-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z"/></symbol>
</defs></svg>
<div class="page">
  <div class="wrap">
    <div class="hdr">
      <svg class="logo" fill="currentColor"><use href="#i-plane"/></svg>
      <div>
        <h1>AM4 Utilities</h1>
        <p class="sub">Airlines Manager 4 Tools</p>
      </div>
    </div>

    <div class="tools">
      <!-- Ticket Price Calculator -->
      <section class="card open" id="ticketCard">
        <div class="cardHead" data-tool="ticket">
          <h2>Ticket Price Calculator</h2>
          <div class="headRight">
            <button class="clearBtn" id="ticketClear" title="Clear">&times;</button>
            <svg class="chev"><use href="#i-chev"/></svg>
          </div>
        </div>
        <div class="body">
          <div class="inner">
            <div class="field">
              <label>Base Price - Y Class (Economy)</label>
              <input id="yBase" type="text" inputmode="numeric" enterkeyhint="next" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
            <div class="field">
              <label>Base Price - J Class (Business)</label>
              <input id="jBase" type="text" inputmode="numeric" enterkeyhint="next" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
            <div class="field">
              <label>Base Price - F Class (First)</label>
              <input id="fBase" type="text" inputmode="numeric" enterkeyhint="done" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
          </div>
        </div>
        <div class="results">
          <div class="resBox">
            <div class="resGrid">
              <div class="resCell"><p class="resLabel">Y Class</p><p class="resVal" id="tY">$ 0</p></div>
              <div class="resCell"><p class="resLabel">J Class</p><p class="resVal" id="tJ">$ 0</p></div>
              <div class="resCell"><p class="resLabel">F Class</p><p class="resVal" id="tF">$ 0</p></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Seat Optimizer -->
      <section class="card" id="seatCard">
        <div class="cardHead" data-tool="seat">
          <h2>Seat Optimizer</h2>
          <div class="headRight">
            <button class="clearBtn" id="seatClear" title="Clear">&times;</button>
            <svg class="chev"><use href="#i-chev"/></svg>
          </div>
        </div>
        <div class="body">
          <div class="inner">
            <div class="acBox">
              <h3>Search or Select Aircraft</h3>
              <div class="combo">
                <div class="comboInner">
                  <input class="acSearch" id="acSearch" type="text" autocomplete="off" placeholder="Type to search (e.g. A330, MD-11...)">
                  <div class="badge" id="acBadge">
                    <span class="count" id="acCount">0</span>
                    <button class="acClear" id="acClear" title="Clear selection">&times;</button>
                    <button class="acToggle" id="acToggle" title="Toggle dropdown"><svg><use href="#i-chev"/></svg></button>
                  </div>
                </div>
                <div class="dropdown" id="acDropdown"></div>
                <div class="noRes" id="acNoRes"><p>No aircraft found for "<span id="acNoResQ"></span>"</p></div>
              </div>
              <div class="acInfo" id="acInfo">
                <div class="acInfoRow">
                  <div class="acItem acModel">
                    <svg class="i24" fill="currentColor"><use href="#i-plane"/></svg>
                    <span id="infoModel"></span>
                  </div>
                  <div class="acGroup">
                    <div class="acItem">
                      <svg class="i24" fill="currentColor"><use href="#i-seat"/></svg>
                      <span id="infoSeats"></span>
                    </div>
                    <div class="acItem">
                      <svg class="i20" fill="currentColor"><use href="#i-tag"/></svg>
                      <span id="infoPrice"></span>
                    </div>
                  </div>
                </div>
              </div>
              <p class="hints"><kbd>&uarr;&darr;</kbd> navigate &middot; <kbd>Enter</kbd> select &middot; <kbd>Esc</kbd> close</p>
            </div>

            <div class="field">
              <label>Demand - Y Class (Economy)</label>
              <input id="demandY" type="text" inputmode="numeric" enterkeyhint="next" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
            <div class="field">
              <label>Demand - J Class (Business)</label>
              <input id="demandJ" type="text" inputmode="numeric" enterkeyhint="next" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
            <div class="field">
              <label>Demand - F Class (First)</label>
              <input id="demandF" type="text" inputmode="numeric" enterkeyhint="next" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
            <div class="field">
              <label>Total number of seats in the plane</label>
              <input id="planeSeats" type="text" inputmode="numeric" enterkeyhint="done" pattern="[0-9]*" maxlength="5" placeholder="0">
            </div>
          </div>
        </div>
        <div class="results">
          <div class="resBox">
            <div class="resGrid">
              <div class="resCell"><p class="resLabel">Y Seats</p><p class="resVal" id="sY">0</p></div>
              <div class="resCell"><p class="resLabel">J Seats</p><p class="resVal" id="sJ">0</p></div>
              <div class="resCell"><p class="resLabel">F Seats</p><p class="resVal" id="sF">0</p></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="foot">
      <a href="https://github.com/enzoscarpa-fnk/AM4Util/issues" target="_blank" rel="noopener noreferrer">Report a bug and help us enhance this tool</a>
    </div>
  </div>
</div>

const $ = id => document.getElementById(id);
const num = v => Number(v) || 0;
const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = n => new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 }).format(n);
function digits(el){ const v = el.value.replace(/\D/g, ''); if (v !== el.value) el.value = v; return v; }

/* ---------- accordion ---------- */
let openTool = 'ticket';
function setOpen(name){
  openTool = (openTool === name) ? null : name;
  $('ticketCard').classList.toggle('open', openTool === 'ticket');
  $('seatCard').classList.toggle('open', openTool === 'seat');
}
document.querySelectorAll('.cardHead').forEach(h => h.addEventListener('click', () => setOpen(h.dataset.tool)));

/* ---------- ticket calculator ---------- */
const yB = $('yBase'), jB = $('jBase'), fB = $('fBase');
function ticketCalc(){
  const y = num(digits(yB)), j = num(digits(jB)), f = num(digits(fB));
  $('tY').textContent = '$ ' + Math.floor(y * 1.1);
  $('tJ').textContent = '$ ' + Math.floor(j * 1.08);
  $('tF').textContent = '$ ' + Math.floor(f * 1.06);
  $('ticketCard').classList.toggle('hasResults', !!(yB.value || jB.value || fB.value));
}
[yB, jB, fB].forEach(el => el.addEventListener('input', ticketCalc));
$('ticketClear').addEventListener('click', e => {
  e.stopPropagation();
  yB.value = jB.value = fB.value = '';
  ticketCalc();
});

/* ---------- seat optimizer ---------- */
const dY = $('demandY'), dJ = $('demandJ'), dF = $('demandF'), pS = $('planeSeats');
function seatCalc(){
  const y = num(digits(dY)), j = num(digits(dJ)), f = num(digits(dF)), s = num(digits(pS));
  const total = y + j * 2 + f * 3;
  const seats = d => (total === 0 || s === 0) ? 0 : Math.round((d * s) / total);
  $('sY').textContent = seats(y);
  $('sJ').textContent = seats(j);
  $('sF').textContent = seats(f);
  $('seatCard').classList.toggle('hasResults', !!((dY.value || dJ.value || dF.value) && pS.value));
}
[dY, dJ, dF, pS].forEach(el => el.addEventListener('input', seatCalc));

/* ---------- aircraft search ---------- */
const search = $('acSearch'), drop = $('acDropdown'), badge = $('acBadge'),
      noRes = $('acNoRes'), info = $('acInfo'), acClear = $('acClear');
let selId = null, dropOpen = false, hi = -1, filtered = [];

// substring match (sorted by position, then name length); subsequence fallback for fuzziness
function match(q){
  if (!q) return A.map((a, i) => i);
  q = q.toLowerCase();
  if (q.length < 2) return [];
  const hits = [];
  A.forEach((a, i) => { const at = a[0].toLowerCase().indexOf(q); if (at >= 0) hits.push([i, at, a[0].length]); });
  if (hits.length){ hits.sort((x, y) => x[1] - y[1] || x[2] - y[2]); return hits.map(h => h[0]); }
  const sub = [];
  A.forEach((a, i) => {
    const m = a[0].toLowerCase(); let k = 0;
    for (let c = 0; c < m.length && k < q.length; c++) if (m[c] === q[k]) k++;
    if (k === q.length) sub.push(i);
  });
  return sub;
}

function renderBadge(){
  badge.style.display = search.value ? 'flex' : 'none';
  badge.classList.toggle('dropOpen', dropOpen);
  $('acCount').textContent = filtered.length;
  acClear.style.display = selId != null ? '' : 'none';
}
function renderDrop(){
  if (dropOpen && filtered.length){
    drop.style.display = 'block';
    drop.innerHTML = filtered.map((i, pos) => {
      const a = A[i];
      const cls = pos === hi ? 'opt hi' : (i === selId ? 'opt sel' : 'opt');
      return '<div class="' + cls + '" data-i="' + i + '" data-pos="' + pos + '">' +
             '<span class="optModel">' + esc(a[0]) + '</span>' +
             '<span class="optSeats">' + a[1] + ' seats</span></div>';
    }).join('');
  } else {
    drop.style.display = 'none';
    drop.innerHTML = '';
  }
  const empty = dropOpen && search.value.length >= 2 && !filtered.length;
  noRes.style.display = empty ? 'block' : 'none';
  if (search.value) $('acNoResQ').textContent = search.value;
}
function renderInfo(){
  if (selId == null){ info.style.display = 'none'; return; }
  const a = A[selId];
  info.style.display = 'block';
  $('infoModel').textContent = a[0];
  $('infoSeats').textContent = a[1];
  $('infoPrice').textContent = '$' + fmt(a[2]);
}
function selectAircraft(i){
  selId = i;
  pS.value = A[i][1];
  search.value = A[i][0];
  dropOpen = false; hi = -1;
  filtered = match(search.value);
  renderBadge(); renderDrop(); renderInfo(); seatCalc();
}
function clearSelection(){
  selId = null; search.value = ''; dropOpen = false;
  filtered = match('');
  renderBadge(); renderDrop(); renderInfo();
}

search.addEventListener('input', () => {
  filtered = match(search.value);
  if (!search.value){ dropOpen = false; hi = -1; } else { dropOpen = true; hi = 0; }
  renderBadge(); renderDrop();
});
search.addEventListener('focus', () => { if (search.value){ dropOpen = true; renderBadge(); renderDrop(); } });
search.addEventListener('keydown', e => {
  if (!dropOpen){ if (e.key === 'Enter' && search.value){ dropOpen = true; renderBadge(); renderDrop(); } return; }
  if (e.key === 'ArrowDown'){ e.preventDefault(); hi = Math.min(hi + 1, filtered.length - 1); renderDrop(); scrollHi(); }
  else if (e.key === 'ArrowUp'){ e.preventDefault(); hi = Math.max(hi - 1, 0); renderDrop(); scrollHi(); }
  else if (e.key === 'Enter'){ e.preventDefault(); if (hi >= 0 && filtered[hi] != null) selectAircraft(filtered[hi]); }
  else if (e.key === 'Escape'){ dropOpen = false; hi = -1; renderDrop(); }
});
function scrollHi(){ const el = drop.children[hi]; if (el) el.scrollIntoView({ block: 'nearest' }); }

drop.addEventListener('click', e => { const o = e.target.closest('.opt'); if (o) selectAircraft(+o.dataset.i); });
drop.addEventListener('mousemove', e => {
  const o = e.target.closest('.opt'); if (!o) return;
  const pos = +o.dataset.pos; if (pos !== hi){ hi = pos; renderDrop(); }
});

$('acToggle').addEventListener('click', () => { dropOpen = !dropOpen; if (dropOpen) hi = 0; renderBadge(); renderDrop(); });
acClear.addEventListener('click', clearSelection);
$('seatClear').addEventListener('click', e => {
  e.stopPropagation();
  dY.value = dJ.value = dF.value = pS.value = '';
  clearSelection();
  seatCalc();
});

// close dropdown on outside click (badge excluded so the toggle button works)
document.addEventListener('click', e => {
  if (!search.contains(e.target) && !drop.contains(e.target) && !badge.contains(e.target)){
    if (dropOpen){ dropOpen = false; renderBadge(); renderDrop(); }
  }
});

/* ---------- Enter advances to the next field (consistent across browsers) ---------- */
function enterAdvance(group){
  group.forEach((el, i) => el.addEventListener('keydown', e => {
    if (e.key === 'Enter'){
      e.preventDefault();
      const next = group[i + 1];
      if (next) next.focus(); else el.blur();
    }
  }));
}
enterAdvance([yB, jB, fB]);
enterAdvance([dY, dJ, dF, pS]);

/* ---------- init ---------- */
filtered = match('');
ticketCalc();
seatCalc();
renderBadge();
renderInfo();
renderDrop();
</script>
